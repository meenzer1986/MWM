
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Grillfleisch Quartett - BBQ Edition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #111;
      --card-bg: #1b130f;
      --accent: #e4572e;
      --accent-soft: #f2a65a;
      --text: #f7f3e9;
      --muted: #b8a99a;
      --border: #3a2b22;
      --radius: 18px;
      --shadow: 0 18px 40px rgba(0,0,0,0.6);
      --font: system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      background: radial-gradient(circle at top, #2a1b10 0, #050505 55%);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 12px 40px;
    }
    .app {
      width: 100%;
      max-width: 1120px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
    }
    .panel {
      background: linear-gradient(145deg, rgba(255,255,255,0.04), rgba(0,0,0,0.65));
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: var(--shadow);
      padding: 18px;
      backdrop-filter: blur(18px);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.4rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 20%, #ffe9c7 0, #f2672b 45%, #7b1b10 90%);
      box-shadow: 0 0 14px rgba(242,103,43,0.9);
    }
    .subtitle {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 14px;
    }
    @media (max-width: 640px) {
      .form-grid { grid-template-columns: 1fr; }
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 3px;
      font-size: 0.78rem;
    }
    label {
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--muted);
    }
    input, textarea {
      background: rgba(10,7,5,0.92);
      border-radius: 999px;
      border: 1px solid var(--border);
      padding: 7px 11px;
      font-size: 0.84rem;
      color: var(--text);
      outline: none;
    }
    textarea {
      min-height: 62px;
      resize: vertical;
      border-radius: 14px;
    }
    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(228,87,46,0.65);
    }
    input[type="file"] {
      border-style: dashed;
    }
    .buttons-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    button {
      border-radius: 999px;
      border: none;
      padding: 7px 13px;
      font-size: 0.82rem;
      cursor: pointer;
      font-weight: 500;
      text-transform: uppercase;
    }
    button.primary {
      background: linear-gradient(135deg, #f26b2b, #f2a65a);
      color: #130a05;
      box-shadow: 0 9px 22px rgba(0,0,0,0.6);
    }
    button:hover { transform: translateY(-1px); }
    .card-shell {
      width: 100%;
      aspect-ratio: 4 / 5;
      border-radius: var(--radius);
      background: radial-gradient(circle at top, #503329 0, #120805 40%, #050302 100%);
      padding: 7px;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: var(--shadow);
    }
    .card-inner {
      width: 100%;
      height: 100%;
      border-radius: calc(var(--radius) - 4px);
      background: linear-gradient(145deg, rgba(255,255,255,0.04), rgba(0,0,0,0.86));
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .card-wood {
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(90deg, #45251a 0, #3a2018 5px, #2f1711 10px, #2a130f 15px);
      mix-blend-mode: soft-light;
      opacity: 0.94;
    }
    .card-top-bar {
      padding: 8px 11px 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-title {
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .card-badge {
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(0,0,0,0.65);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-soft); }
    .card-image-wrap {
      margin: 0 9px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.16);
      background: radial-gradient(circle at top, #5b3322 0, #180a05 60%);
      flex: 0 0 58%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .card-image-placeholder {
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      padding: 10px;
    }
    .card-bottom {
      padding: 7px 9px 9px;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 6px;
      font-size: 0.72rem;
    }
    .row {
      display: flex;
      justify-content: space-between;
      gap: 6px;
    }
    .row span.label {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.65rem;
    }
    .pill {
      margin-top: 2px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      padding: 3px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
    }
    .rating-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
    }
    .cards-list {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-height: 210px;
      overflow-y: auto;
    }
    .cards-list-item {
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.4);
      cursor: pointer;
    }
    .cards-list-item.active {
      border-color: var(--accent);
      background: rgba(242,107,43,0.18);
    }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: rgba(10,10,10,0.95);
      color: var(--text);
      padding: 7px 11px;
      font-size: 0.78rem;
      border-radius: 999px;
      box-shadow: 0 12px 26px rgba(0,0,0,0.7);
      opacity: 0;
      transition: opacity 0.18s ease;
      z-index: 40;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="app">
    <section class="panel">
      <h1><span class="logo-dot"></span>Grillfleisch Quartett</h1>
      <div class="subtitle">Fülle die Felder aus, lade ein Bild hoch und exportiere als JPEG</div>

      <form id="card-form">
        <div class="form-grid">
          <div class="field">
            <label>Name</label>
            <input id="name" placeholder="Dry Aged Ribeye">
          </div>
          <div class="field">
            <label>Fleischsorte</label>
            <input id="category" placeholder="Rind">
          </div>
          <div class="field">
            <label>Verkäufer</label>
            <input id="seller" placeholder="Metzgerei Max">
          </div>
          <div class="field">
            <label>Herkunft</label>
            <input id="origin" placeholder="Argentinien">
          </div>
          <div class="field">
            <label>Preis</label>
            <input id="price" placeholder="24,99 €/kg">
          </div>
          <div class="field">
            <label>Marmorierung</label>
            <input id="marbling" placeholder="8/10">
          </div>
          <div class="field">
            <label>Fettgehalt</label>
            <input id="fat" placeholder="25%">
          </div>
          <div class="field">
            <label>Reifung</label>
            <input id="aging" placeholder="21 Tage Dry Aged">
          </div>
          <div class="field">
            <label>Bewertung</label>
            <input id="rating" placeholder="9/10">
          </div>
          <div class="field">
            <label>Notizen</label>
            <textarea id="notes" placeholder="Sehr saftig, perfekt für Reverse Sear"></textarea>
          </div>
          <div class="field">
            <label>Bild</label>
            <input type="file" id="image" accept="image/*">
          </div>
        </div>
        <div class="buttons-row">
          <button type="button" class="primary" id="save-card">Karte speichern</button>
          <button type="button" class="primary" id="export-jpeg">Als JPEG exportieren</button>
          <button type="button" class="primary" id="new-card">Neue Karte</button>
        </div>
      </form>
      <div class="cards-list" id="cards-list"></div>
    </section>

    <section class="panel">
      <h1><span class="logo-dot"></span>Vorschau</h1>
      <div class="card-shell">
        <div class="card-inner" id="card-capture">
          <div class="card-wood"></div>
          <div class="card-top-bar">
            <div class="card-title" id="preview-name">Grillfleisch</div>
            <div class="card-badge">
              <span class="dot"></span>
              <span id="preview-category">Fleischsorte</span>
            </div>
          </div>
          <div class="card-image-wrap">
            <img id="preview-image" alt="Fleischbild" style="display:none;">
            <div class="card-image-placeholder" id="preview-placeholder">Bild hochladen</div>
          </div>
          <div class="card-bottom">
            <div class="card-list">
              <div class="row"><span class="label">Preis</span><span id="preview-price">-</span></div>
              <div class="row"><span class="label">Marmorierung</span><span id="preview-marbling">-</span></div>
              <div class="row"><span class="label">Fettgehalt</span><span id="preview-fat">-</span></div>
              <div class="row"><span class="label">Reifung</span><span id="preview-aging">-</span></div>
              <div class="pill">
                <span>Bewertung</span>
                <span style="display:flex;gap:6px;">
                  <span id="preview-rating">-</span>
                  <span class="rating-dot"></span>
                </span>
              </div>
            </div>
            <div>
              <div class="row"><span class="label">Verkäufer</span><span id="preview-seller">-</span></div>
              <div class="row"><span class="label">Herkunft</span><span id="preview-origin">-</span></div>
              <div class="footer">
                <span id="preview-notes">Notizen</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>
  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    const state = {cards: [], activeId: null, imageDataUrl: null};
    const inputs = {
      name: document.getElementById('name'),
      category: document.getElementById('category'),
      seller: document.getElementById('seller'),
      origin: document.getElementById('origin'),
      price: document.getElementById('price'),
      marbling: document.getElementById('marbling'),
      fat: document.getElementById('fat'),
      aging: document.getElementById('aging'),
      rating: document.getElementById('rating'),
      notes: document.getElementById('notes'),
      image: document.getElementById('image')
    };
    const preview = {
      name: document.getElementById('preview-name'),
      category: document.getElementById('preview-category'),
      seller: document.getElementById('preview-seller'),
      origin: document.getElementById('preview-origin'),
      price: document.getElementById('preview-price'),
      marbling: document.getElementById('preview-marbling'),
      fat: document.getElementById('preview-fat'),
      aging: document.getElementById('preview-aging'),
      rating: document.getElementById('preview-rating'),
      notes: document.getElementById('preview-notes'),
      image: document.getElementById('preview-image'),
      placeholder: document.getElementById('preview-placeholder')
    };

    function updatePreview() {
      preview.name.textContent = inputs.name.value || 'Grillfleisch';
      preview.category.textContent = inputs.category.value || 'Fleischsorte';
      preview.seller.textContent = inputs.seller.value || '–';
      preview.origin.textContent = inputs.origin.value || '–';
      preview.price.textContent = inputs.price.value || '–';
      preview.marbling.textContent = inputs.marbling.value || '–';
      preview.fat.textContent = inputs.fat.value || '–';
      preview.aging.textContent = inputs.aging.value || '–';
      preview.rating.textContent = inputs.rating.value || '–';
      preview.notes.textContent = inputs.notes.value || 'Notizen';

      if (state.imageDataUrl) {
        preview.image.src = state.imageDataUrl;
        preview.image.style.display = 'block';
        preview.placeholder.style.display = 'none';
      } else {
        preview.image.style.display = 'none';
        preview.placeholder.style.display = 'block';
      }
    }

    Object.values(inputs).forEach(el => {
      if (el && el.type !== 'file') el.addEventListener('input', updatePreview);
    });

    inputs.image.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          state.imageDataUrl = ev.target.result;
          updatePreview();
        };
        reader.readAsDataURL(file);
      }
    });

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    document.getElementById('save-card').addEventListener('click', () => {
      const card = {
        id: Date.now(),
        name: inputs.name.value,
        category: inputs.category.value,
        seller: inputs.seller.value,
        origin: inputs.origin.value,
        price: inputs.price.value,
        marbling: inputs.marbling.value,
        fat: inputs.fat.value,
        aging: inputs.aging.value,
        rating: inputs.rating.value,
        notes: inputs.notes.value,
        imageDataUrl: state.imageDataUrl
      };
      state.cards.push(card);
      showToast('Karte gespeichert!');
    });

    document.getElementById('export-jpeg').addEventListener('click', async () => {
      const cardNode = document.getElementById('card-capture');
      const canvas = await html2canvas(cardNode, {
        scale: 3,
        width: 1080,
        height: 1350,
        backgroundColor: null,
        useCORS: true
      });

      const name = inputs.name.value.trim() || 'grillfleisch-karte';
      const filename = name.toLowerCase().replace(/\s+/g, '-') + '.jpg';

      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/jpeg', 0.92);
      link.click();

      showToast('JPEG gespeichert: ' + filename);
    });

    document.getElementById('new-card').addEventListener('click', () => {
      Object.values(inputs).forEach(el => el.value = '');
      state.imageDataUrl = null;
      updatePreview();
      showToast('Neue Karte bereit');
    });

    updatePreview();
  </script>
</body>
</html>
